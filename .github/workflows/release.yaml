name: Release

on:
  push:
    tags: ['v*']

env:
  artifacts_name: 'building-artifacts'

permissions: {}

jobs:
  tests:
    uses: ./.github/workflows/tests.yaml
    permissions:
      contents: read
  func-tests:
    uses: ./.github/workflows/func-tests.yaml
    permissions:
      contents: read

  prepare:
    name: Prepare Variables
    needs: [tests, func-tests]
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      release_version: ${{ steps.enver.outputs.release_version }}
      is_prerelease: ${{ steps.semver.outputs.prerelease != '' }}
    steps:
      - name: Set env
        id: enver
        run: |
          # Release tag comes from the github reference.
          RELEASE_TAG=$(echo ${GITHUB_REF} | sed -e 's!.*/!!')
          # Ensure the release tag has expected format.
          echo ${RELEASE_TAG} | grep -q '^v' || exit 1
          # Release version is same as release tag without leading 'v'.
          RELEASE_VERSION=$(echo ${GITHUB_REF} | sed -e 's!.*/v!!')
          echo "release_version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Parse semver
        id: semver
        uses: madhead/semver-utils@4cf918affe9106ea59f86c6250e5ec4570ac4389 # v5.0.0
        with:
          version: ${{ steps.enver.outputs.release_version }}

  build:
    name: Build For Different Arch
    strategy:
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    needs: prepare
    permissions:
      contents: read
    env:
      release_version: ${{needs.prepare.outputs.release_version}}
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: 'Setup Go'
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: './go.mod'
          # Do not share module cache with artifact-publishing runs (cache poisoning)
          cache: false
        id: go

      - name: Set env
        run: |
          # Set arch related variables
          echo "goos=$(go env GOOS)" >> $GITHUB_ENV
          echo "goarch=$(go env GOARCH)" >> $GITHUB_ENV

      - name: Build on ${{runner.os}}
        # Use shell variables, not ${{ }} expansions: interpolating expressions
        # into scripts enables template injection
        run: |
          #Building for main platform
          binary="dkc-${release_version}-${goos}-${goarch}"
          go build -o "${binary}" -ldflags="-s -w -X github.com/p2p-org/dkc/cmd.ReleaseVersion=${release_version}" .
          tar zcf "${binary}.tar.gz" "${binary}"
          shasum -a 256 "${binary}.tar.gz" >"${binary}.sha256"

      - name: Save to artifacts
        id: artifacts-save
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.artifacts_name }}-${{ matrix.os }}
          path: |
            ./dkc-**.tar.gz
            ./dkc-**.sha256
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - build
      - prepare
    permissions:
      contents: write # create the GitHub release
    env:
      release_version: ${{needs.prepare.outputs.release_version}}
      is_prerelease: ${{needs.prepare.outputs.is_prerelease}}
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Download Ubuntu artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.artifacts_name }}-ubuntu-latest
          path: ./artifacts

      - name: Download macOS artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.artifacts_name }}-macos-14
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: |
            ./artifacts/dkc-**.tar.gz
            ./artifacts/dkc-**.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
          prerelease: ${{ env.is_prerelease }}
